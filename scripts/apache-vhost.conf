# Configurazione per sviluppo frontend React (Vite)
<VirtualHost *:80>
    ServerName frontend.nexiosolution.local

    # Proxy verso Vite dev server
    ProxyRequests Off
    ProxyPreserveHost On
    ProxyPass / http://localhost:5173/
    ProxyPassReverse / http://localhost:5173/

    # WebSocket per HMR (Hot Module Replacement)
    RewriteEngine On
    RewriteCond %{HTTP:Upgrade} websocket [NC]
    RewriteCond %{HTTP:Connection} upgrade [NC]
    RewriteRule ^/?(.*) "ws://localhost:5173/$1" [P,L]

    ErrorLog "C:/xampp/apache/logs/nexiosolution-frontend-error.log"
    CustomLog "C:/xampp/apache/logs/nexiosolution-frontend-access.log" combined
</VirtualHost>

# Configurazione per PHPMyAdmin personalizzato
<VirtualHost *:80>
    ServerName db.nexiosolution.local

    # Proxy verso PHPMyAdmin
    ProxyRequests Off
    ProxyPreserveHost On
    ProxyPass / http://localhost/phpmyadmin/
    ProxyPassReverse / http://localhost/phpmyadmin/

    # Sicurezza aggiuntiva per PHPMyAdmin
    <Location />
        # Limitare accesso solo da IP locali
        Require ip 127.0.0.1
        Require ip ::1
        Require ip 192.168
        Require ip 10
    </Location>

    ErrorLog "C:/xampp/apache/logs/nexiosolution-phpmyadmin-error.log"
    CustomLog "C:/xampp/apache/logs/nexiosolution-phpmyadmin-access.log" combined
</VirtualHost>