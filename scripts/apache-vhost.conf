# =====================================================
# NexioSolution - Configurazione Apache VirtualHost
# =====================================================
# Configurazione per multi-tenant con wildcard subdomain
# Supporto per WebSocket, CalDAV e CORS

# Configurazione principale per NexioSolution
<VirtualHost *:80>
    ServerName nexiosolution.local
    ServerAlias *.nexiosolution.local
    DocumentRoot "C:/xampp/htdocs/Nexiosolution/backend/public"

    # Directory principale
    <Directory "C:/xampp/htdocs/Nexiosolution/backend/public">
        Options Indexes FollowSymLinks MultiViews
        AllowOverride All
        Require all granted

        # Abilita CORS per API
        Header always set Access-Control-Allow-Origin "*"
        Header always set Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS, PATCH"
        Header always set Access-Control-Allow-Headers "Content-Type, Authorization, X-Requested-With, X-CSRF-TOKEN"
        Header always set Access-Control-Allow-Credentials "true"
        Header always set Access-Control-Max-Age "3600"

        # Gestione richieste OPTIONS per CORS preflight
        RewriteEngine On
        RewriteCond %{REQUEST_METHOD} OPTIONS
        RewriteRule ^(.*)$ $1 [R=200,L]
    </Directory>

    # Alias per storage pubblico
    Alias /storage "C:/xampp/htdocs/Nexiosolution/backend/storage/app/public"
    <Directory "C:/xampp/htdocs/Nexiosolution/backend/storage/app/public">
        Options Indexes FollowSymLinks
        AllowOverride None
        Require all granted
    </Directory>

    # Configurazione per CalDAV
    <Location /dav>
        DAV On
        AuthType Basic
        AuthName "NexioSolution CalDAV"
        AuthUserFile "C:/xampp/htdocs/Nexiosolution/.htpasswd"
        Require valid-user

        # Headers per CalDAV
        Header always set DAV "1, 2, 3, calendar-access, addressbook"
        Header always set MS-Author-Via "DAV"
    </Location>

    # Proxy per WebSocket (Laravel Echo Server)
    ProxyRequests Off
    ProxyPreserveHost On

    <Location /ws>
        ProxyPass ws://localhost:6001/
        ProxyPassReverse ws://localhost:6001/
    </Location>

    # Proxy per socket.io
    <Location /socket.io>
        ProxyPass http://localhost:6001/socket.io/
        ProxyPassReverse http://localhost:6001/socket.io/

        # Headers per WebSocket
        Header always set Upgrade $http_upgrade
        Header always set Connection "upgrade"
    </Location>

    # Proxy per OnlyOffice (se installato localmente)
    <Location /onlyoffice>
        ProxyPass http://localhost:8080/
        ProxyPassReverse http://localhost:8080/

        # Headers per OnlyOffice
        Header always set X-Forwarded-Proto "http"
        Header always set X-Forwarded-Host $host
    </Location>

    # Security Headers
    Header always set X-Frame-Options "SAMEORIGIN"
    Header always set X-Content-Type-Options "nosniff"
    Header always set X-XSS-Protection "1; mode=block"
    Header always set Referrer-Policy "strict-origin-when-cross-origin"
    Header always set Content-Security-Policy "default-src 'self' 'unsafe-inline' 'unsafe-eval' https: wss: data: blob:;"

    # Compressione GZIP
    <IfModule mod_deflate.c>
        AddOutputFilterByType DEFLATE text/html text/plain text/xml text/css text/javascript
        AddOutputFilterByType DEFLATE application/javascript application/x-javascript
        AddOutputFilterByType DEFLATE application/json application/xml application/rss+xml
        AddOutputFilterByType DEFLATE image/svg+xml
    </IfModule>

    # Cache Control
    <IfModule mod_expires.c>
        ExpiresActive On
        ExpiresByType image/jpg "access plus 1 year"
        ExpiresByType image/jpeg "access plus 1 year"
        ExpiresByType image/gif "access plus 1 year"
        ExpiresByType image/png "access plus 1 year"
        ExpiresByType image/svg+xml "access plus 1 year"
        ExpiresByType text/css "access plus 1 month"
        ExpiresByType application/javascript "access plus 1 month"
        ExpiresByType application/x-font-ttf "access plus 1 year"
        ExpiresByType application/x-font-woff "access plus 1 year"
        ExpiresByType application/x-font-woff2 "access plus 1 year"
    </IfModule>

    # Log Files
    ErrorLog "C:/xampp/apache/logs/nexiosolution-error.log"
    CustomLog "C:/xampp/apache/logs/nexiosolution-access.log" combined

    # Log level
    LogLevel warn
</VirtualHost>

# Configurazione SSL (HTTPS)
<VirtualHost *:443>
    ServerName nexiosolution.local
    ServerAlias *.nexiosolution.local
    DocumentRoot "C:/xampp/htdocs/Nexiosolution/backend/public"

    # Certificati SSL
    SSLEngine on
    SSLCertificateFile "C:/xampp/apache/conf/ssl.crt/nexiosolution.crt"
    SSLCertificateKeyFile "C:/xampp/apache/conf/ssl.key/nexiosolution.key"

    # Protocolli SSL sicuri
    SSLProtocol -all +TLSv1.2 +TLSv1.3
    SSLCipherSuite ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384
    SSLHonorCipherOrder on

    # HSTS (HTTP Strict Transport Security)
    Header always set Strict-Transport-Security "max-age=31536000; includeSubDomains; preload"

    # Directory principale
    <Directory "C:/xampp/htdocs/Nexiosolution/backend/public">
        Options Indexes FollowSymLinks MultiViews
        AllowOverride All
        Require all granted

        # CORS Headers
        Header always set Access-Control-Allow-Origin "*"
        Header always set Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS, PATCH"
        Header always set Access-Control-Allow-Headers "Content-Type, Authorization, X-Requested-With, X-CSRF-TOKEN"
        Header always set Access-Control-Allow-Credentials "true"
    </Directory>

    # Alias per storage
    Alias /storage "C:/xampp/htdocs/Nexiosolution/backend/storage/app/public"
    <Directory "C:/xampp/htdocs/Nexiosolution/backend/storage/app/public">
        Options Indexes FollowSymLinks
        AllowOverride None
        Require all granted
    </Directory>

    # WebSocket Proxy con SSL
    SSLProxyEngine On
    ProxyRequests Off
    ProxyPreserveHost On

    <Location /ws>
        ProxyPass wss://localhost:6001/
        ProxyPassReverse wss://localhost:6001/
    </Location>

    <Location /socket.io>
        ProxyPass https://localhost:6001/socket.io/
        ProxyPassReverse https://localhost:6001/socket.io/
    </Location>

    # OnlyOffice Proxy con SSL
    <Location /onlyoffice>
        ProxyPass https://localhost:8443/
        ProxyPassReverse https://localhost:8443/
    </Location>

    # Security Headers per HTTPS
    Header always set X-Frame-Options "SAMEORIGIN"
    Header always set X-Content-Type-Options "nosniff"
    Header always set X-XSS-Protection "1; mode=block"
    Header always set Referrer-Policy "strict-origin-when-cross-origin"

    # Log Files SSL
    ErrorLog "C:/xampp/apache/logs/nexiosolution-ssl-error.log"
    CustomLog "C:/xampp/apache/logs/nexiosolution-ssl-access.log" combined
</VirtualHost>

